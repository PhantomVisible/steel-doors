<section class="installations" id="installations" #installSection>
  <div class="container">
    <div class="installations__header" data-animate>
      <h2 class="section-title">{{ 'INSTALLATIONS.TITLE' | translate }}</h2>
      <p class="section-subtitle">{{ 'INSTALLATIONS.SUBTITLE' | translate }}</p>
    </div>

    <!-- Category Filters -->
    <div class="category-filters" data-animate>
      <button 
        *ngFor="let cat of categories" 
        class="category-pill" 
        [class.active]="activeCategory === cat"
        (click)="selectCategory(cat)">
        {{ cat.name }} ({{ cat.images.length }})
      </button>
    </div>

    <!-- Adaptive Grid -->
    <div class="installations__grid-container">
      <div 
        class="installations__grid" 
        [ngClass]="activeCategory.images.length > 16 ? 'dense-grid' : 'standard-grid'">
        <div 
          *ngFor="let imgUrl of activeCategory.images; let i = index" 
          class="installations__grid-item"
          [style.animation-delay]="(i * 0.05) + 's'"
          (click)="openLightbox(imgUrl)">
          <img [src]="imgUrl" alt="Installation Image" loading="lazy" class="installations__grid-image">
        </div>
      </div>
    </div>
  </div>

  <!-- Fullscreen Lightbox (Hidden by default via SCSS, NOT *ngIf) -->
  <div class="lightbox-overlay" #lightboxOverlay (click)="closeLightbox()">
    <button class="lightbox__close" (click)="closeLightbox()">✕</button>
    <img [src]="selectedImage || ''" alt="Enlarged Detail" class="lightbox__image" #lightboxImg (click)="$event.stopPropagation()">
  </div>
</section>
