<section class="hero" id="hero" #heroSection>
  <!-- 3D Canvas -->
  <canvas class="hero__canvas" #heroCanvas></canvas>

  <!-- Overlay Content -->
  <div class="hero__overlay">
    <div class="hero__content">
      <div class="hero__badge" data-animate-hero>{{ 'HERO.BADGE' | translate }}</div>
      <h1 class="hero__title" data-animate-hero>
        {{ 'HERO.TITLE' | translate }}<br>
        <span class="hero__title-accent">{{ 'HERO.TITLE_ACCENT' | translate }}</span>
      </h1>
      <p class="hero__tagline" data-animate-hero>
        {{ 'HERO.TAGLINE' | translate }}
      </p>
      <div class="hero__description" data-animate-hero>
        <p>{{ 'HERO.DESCRIPTION' | translate }}</p>
      </div>
      <div class="hero__cta" data-animate-hero>
        <a href="#installations" class="hero__btn hero__btn--primary">{{ 'HERO.BTN_PRIMARY' | translate }}</a>
        <a href="#contact" class="hero__btn hero__btn--ghost">{{ 'HERO.BTN_SECONDARY' | translate }}</a>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="hero__scroll-indicator">
      <span class="hero__scroll-text">{{ 'HERO.SCROLL' | translate }}</span>
      <div class="hero__scroll-line"></div>
    </div>
  </div>
</section>
