<section class="about" id="about" #aboutSection>
  <div class="container">
    <div class="about__grid">
      
      <!-- Left side (Desktop) / Top side (Mobile): 3D Visual -->
      <div class="about__visual" data-animate>
        
        <!-- The interactive 3D Exploded Door Canvas -->
        <div class="about__canvas-container" #canvasContainer>
          <canvas #aboutCanvas class="about__canvas"></canvas>
          
          <!-- Reassemble Button (Only shows when pieces are swiped away) -->
          <button class="about__reset-btn" (click)="resetLayers()" [class.visible]="swipedLayers.size > 0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            {{ 'ABOUT.REASSEMBLE' | translate }}
          </button>

          <!-- 2D Floating Labels synched to 3D positions -->
          <div class="about__labels">
            <div #labelFrontWood class="about__label">
              <span class="about__label-dot"></span>
              <span class="about__label-line"></span>
              <span class="about__label-text">{{ 'ABOUT.LABEL1' | translate }}</span>
            </div>
            <div #labelFrontFoam class="about__label">
              <span class="about__label-dot"></span>
              <span class="about__label-line"></span>
              <span class="about__label-text">{{ 'ABOUT.LABEL2' | translate }}</span>
            </div>
            <div #labelSkeleton class="about__label">
              <span class="about__label-dot"></span>
              <span class="about__label-line"></span>
              <span class="about__label-text">{{ 'ABOUT.LABEL3' | translate }}</span>
            </div>
            <div #labelBackFoam class="about__label">
              <span class="about__label-dot"></span>
              <span class="about__label-line"></span>
              <span class="about__label-text">{{ 'ABOUT.LABEL4' | translate }}</span>
            </div>
            <div #labelBackWood class="about__label">
              <span class="about__label-dot"></span>
              <span class="about__label-line"></span>
              <span class="about__label-text">{{ 'ABOUT.LABEL5' | translate }}</span>
            </div>
          </div>
        </div>

        <div class="about__certification-badge">
          <svg viewBox="0 0 100 100" class="about__certification-svg">
            <path id="circle-path" d="M 50, 50 m -35, 0 a 35,35 0 1,1 70,0 a 35,35 0 1,1 -70,0" fill="transparent" />
            <text class="about__certification-text">
              <textPath href="#circle-path" startOffset="0%">
                {{ 'ABOUT.BADGE_TEXT' | translate }}
              </textPath>
            </text>
          </svg>
          <div class="about__certification-center">
            <span>8ans+</span>
          </div>
        </div>
      </div>

      <!-- Right side (Desktop) / Bottom side (Mobile): Text Content -->
      <div class="about__content">
        <h2 class="section-title" data-animate>{{ 'ABOUT.TITLE' | translate }}</h2>
        <p class="section-subtitle" data-animate [innerHTML]="'ABOUT.SUBTITLE' | translate"></p>

        <div class="about__carousel" data-animate>
          <div class="about__carousel-track">
            <div 
              *ngFor="let slide of slides; let i = index"
              class="about__carousel-slide"
              [class.active]="i === activeSlideIndex"
            >
              <div class="about__carousel-icon">✦</div>
              <div class="about__carousel-text">
                <h4>{{ slide.title | translate }}</h4>
                <p>{{ slide.description | translate }}</p>
              </div>
              
              <!-- Progress bar at the bottom of each card -->
              <div class="about__carousel-progress">
                <div class="about__carousel-progress-fill"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
